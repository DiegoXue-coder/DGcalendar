<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日历系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:#f5f3ef;color:#1c1c1e;min-height:100vh}
.app{max-width:1060px;margin:0 auto;padding:20px 16px}

/* ── AUTH SCREEN ── */
.auth-screen{position:fixed;inset:0;background:#f5f3ef;z-index:1000;display:flex;align-items:center;justify-content:center}
.auth-screen.hidden{display:none}
.auth-box{background:#fff;border-radius:20px;border:0.5px solid #e5e5ea;padding:36px 40px;width:380px;max-width:94vw;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
.auth-logo{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;text-align:center;margin-bottom:6px}
.auth-sub{font-size:12px;color:#8e8e93;text-align:center;margin-bottom:28px}
.auth-tabs{display:flex;background:#f0f0f5;border-radius:10px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:8px;font-size:13px;cursor:pointer;color:#8e8e93;transition:all 0.18s}
.auth-tab.active{background:#fff;color:#1c1c1e;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;font-weight:500;color:#8e8e93;margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase}
.auth-field input{width:100%;padding:10px 12px;border:0.5px solid #d1d1d6;border-radius:10px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#1c1c1e;outline:none;transition:border-color 0.15s}
.auth-field input:focus{border-color:#1c1c1e}
.auth-btn{width:100%;padding:11px;background:#1c1c1e;color:#fff;border:none;border-radius:10px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:background 0.15s}
.auth-btn:hover{background:#3a3a3c}
.auth-err{font-size:12px;color:#e04c2f;text-align:center;min-height:18px;margin-top:8px}
.auth-demo{margin-top:16px;text-align:center;font-size:11px;color:#b0b0b8}
.auth-demo span{color:#5b7fa6;cursor:pointer;text-decoration:underline}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.topbar-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600}
.topbar-sub{font-size:11px;color:#8e8e93;margin-top:1px}
.topbar-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{background:#fff;border:0.5px solid #d1d1d6;border-radius:8px;padding:5px 13px;font-size:12px;cursor:pointer;color:#1c1c1e;font-family:'Noto Sans SC',sans-serif;transition:background 0.15s;white-space:nowrap}
.btn:hover{background:#f2f2f7}
.btn.active{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.btn.active:hover{background:#3a3a3c}
.btn.accent{background:#e04c2f;color:#fff;border-color:#e04c2f}
.btn.accent:hover{background:#c43a20}
.nav-label{font-size:13px;font-weight:500;min-width:100px;text-align:center}
.sep{width:0.5px;height:18px;background:#d1d1d6;margin:0 1px}

/* ── USER CHIP ── */
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;background:#f0f0f5;border-radius:20px;cursor:pointer;border:0.5px solid #e5e5ea;transition:background 0.15s;position:relative}
.user-chip:hover{background:#e8e8f0}
.user-avatar{width:22px;height:22px;border-radius:50%;background:#1c1c1e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:#1c1c1e;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-menu{position:absolute;top:calc(100%+6px);right:0;background:#fff;border:0.5px solid #e5e5ea;border-radius:12px;padding:6px;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:500;display:none}
.user-menu.open{display:block}
.user-menu-item{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;color:#1c1c1e;white-space:nowrap}
.user-menu-item:hover{background:#f2f2f7}
.user-menu-item.danger{color:#e04c2f}
.user-menu-item.danger:hover{background:#fff0f0}
.user-menu-divider{height:0.5px;background:#e5e5ea;margin:4px 0}
.user-menu-label{padding:6px 12px 2px;font-size:10px;color:#b0b0b8;letter-spacing:0.05em;text-transform:uppercase}

/* ── USER MANAGER MODAL ── */
.um-modal{background:#fff;border-radius:16px;border:0.5px solid #d1d1d6;width:460px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:20px 22px 24px}
.um-section{margin-top:16px}
.um-section-title{font-size:11px;font-weight:500;color:#8e8e93;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px}
.um-user-list{display:flex;flex-direction:column;gap:5px}
.um-user-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:0.5px solid #e5e5ea;background:#fafafa}
.um-avatar{width:28px;height:28px;border-radius:50%;background:#1c1c1e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.um-info{flex:1;min-width:0}
.um-uname{font-size:13px;font-weight:500}
.um-umeta{font-size:10px;color:#8e8e93;margin-top:1px}
.um-badge{font-size:9px;padding:2px 7px;border-radius:10px;background:#f0f0f5;color:#8e8e93;font-weight:500;white-space:nowrap}
.um-badge.you{background:#e8f0ff;color:#3a6bc8}
.um-del{background:none;border:0.5px solid #e5e5ea;border-radius:6px;padding:4px 9px;font-size:11px;color:#8e8e93;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.um-del:hover{background:#fff0f0;border-color:#e04c2f;color:#e04c2f}
.um-pw-section{margin-top:14px;padding:14px;background:#f8f8fa;border-radius:10px}
.um-pw-title{font-size:12px;font-weight:500;margin-bottom:10px}
.um-field{margin-bottom:8px}
.um-field input{width:100%;padding:8px 10px;border:0.5px solid #d1d1d6;border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:12px;outline:none}
.um-save-btn{background:#1c1c1e;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.um-save-btn:hover{background:#3a3a3c}
.um-msg{font-size:11px;min-height:16px;margin-top:6px}
.um-msg.ok{color:#2d9a6a}
.um-msg.err{color:#e04c2f}

/* ── LEGEND ── */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:7px 12px;background:#fff;border-radius:10px;border:0.5px solid #e5e5ea;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#3a3a3c;cursor:pointer;padding:2px 4px;border-radius:4px}
.leg:hover{background:#f5f5f5}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-manage{margin-left:auto;font-size:11px;color:#8e8e93;cursor:pointer;padding:2px 7px;border:0.5px solid #e5e5ea;border-radius:5px}
.leg-manage:hover{background:#f2f2f7;color:#3a3a3c}

/* ── LAYOUT SWITCH ── */
.layout-switch{cursor:pointer;user-select:none}
.ls-track{position:relative;width:112px;height:28px;background:#f0f0f0;border-radius:14px;border:0.5px solid #d1d1d6;display:flex;align-items:center;overflow:hidden}
.ls-thumb{position:absolute;top:2px;left:2px;width:54px;height:22px;background:#1c1c1e;border-radius:11px;transition:transform 0.22s cubic-bezier(.4,0,.2,1);z-index:1}
.ls-thumb.right{transform:translateX(54px)}
.ls-lbl{position:relative;z-index:2;flex:1;text-align:center;font-size:11px;font-weight:500;transition:color 0.2s;pointer-events:none}
.ls-lbl-l{color:#fff}
.ls-lbl-r{color:#8e8e93}
.ls-thumb.right~.ls-lbl-l,.layout-switch.list .ls-lbl-l{color:#8e8e93}
.ls-thumb.right~.ls-lbl-r{color:#fff}

/* ── MONTH VIEW ── */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:500;color:#8e8e93;padding:5px 0}
.cal-dow.sun{color:#e03a2f}.cal-dow.sat{color:#378ADD}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{background:#fff;border-radius:10px;border:0.5px solid #e5e5ea;min-height:80px;padding:7px 6px 5px;cursor:pointer;transition:border-color 0.15s;overflow:hidden}
.day-cell:hover{border-color:#aaaab0;background:#fafafa}
.day-cell.outside{background:#f5f3ef;border-color:transparent;cursor:default}
.day-cell.vacation{background:#fdf8ee;border-color:#e8dfc8}
.day-cell.today{border:1.5px solid #1c1c1e}
.day-num{font-size:12px;font-weight:500;color:#1c1c1e;line-height:20px;margin-bottom:3px}
.day-cell.today .day-num span{background:#1c1c1e;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.day-cell.sunday .day-num{color:#e03a2f}
.day-cell.saturday .day-num{color:#378ADD}
.day-cell.today.sunday .day-num span,.day-cell.today.saturday .day-num span{color:#fff}
.pip-row{display:flex;flex-wrap:wrap;gap:2px}
.pip{height:4px;border-radius:1px;flex:1;min-width:4px;max-width:14px}
.vac-badge{font-size:9px;color:#b08020;margin-top:3px}
.week-num-row{grid-column:1/-1;display:flex;align-items:center;padding:5px 4px 2px;gap:6px}
.week-num-tag{font-size:10px;font-weight:600;color:#8e8e93;background:#f0f0f5;border-radius:4px;padding:2px 7px;letter-spacing:0.04em;white-space:nowrap}
.week-num-line{flex:1;height:0.5px;background:#e5e5ea}

/* ── WEEK TIMELINE VIEW ── */
#weekView{display:none}
.wtl-outer{display:flex;width:100%;border:0.5px solid #e5e5ea;border-radius:12px;overflow:hidden;background:#fff}
.wtl-times{flex-shrink:0;width:44px;background:#fafafa;border-right:0.5px solid #e5e5ea}
.wtl-time-hdr{height:52px;border-bottom:0.5px solid #e5e5ea}
.wtl-time-allday{border-bottom:0.5px solid #e5e5ea;display:flex;align-items:center;justify-content:flex-end;padding:0 5px;font-size:9px;color:#b0b0b8;min-height:28px}
.wtl-time-slot{height:60px;border-bottom:0.5px solid #f0f0f0;display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 5px 0;font-size:9px;color:#b0b0b8}
.wtl-grid{flex:1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.wtl-dhdr{padding:8px 4px 6px;text-align:center;background:#f9f9f9;border-bottom:0.5px solid #e5e5ea;border-right:0.5px solid #e5e5ea;height:52px}
.wtl-dhdr:last-child{border-right:none}
.wtl-dow{font-size:10px;color:#8e8e93;font-weight:500}
.wtl-dnum{font-size:16px;font-weight:600;color:#1c1c1e;line-height:1.1}
.wtl-dhdr.sun .wtl-dow,.wtl-dhdr.sun .wtl-dnum{color:#e03a2f}
.wtl-dhdr.sat .wtl-dow,.wtl-dhdr.sat .wtl-dnum{color:#378ADD}
.wtl-dhdr.tod .wtl-dnum{background:#1c1c1e;color:#fff;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.wtl-dhdr.tod.sun .wtl-dnum,.wtl-dhdr.tod.sat .wtl-dnum{color:#fff}
.wtl-allday{border-bottom:0.5px solid #e5e5ea;border-right:0.5px solid #e5e5ea;padding:3px 3px;min-height:28px}
.wtl-allday:last-child{border-right:none}
.wtl-ae{padding:2px 5px;border-radius:4px;border-left:2px solid;font-size:10px;font-weight:500;cursor:pointer;margin-bottom:2px;word-break:break-all}
.wtl-ae:hover{filter:brightness(0.93)}
.wtl-bodycol{border-right:0.5px solid #e5e5ea;position:relative}
.wtl-bodycol:last-child{border-right:none}
.wtl-hr{position:absolute;left:0;right:0;border-top:0.5px solid #ebebf0;pointer-events:none}
.wtl-evt{position:absolute;left:2px;right:2px;border-radius:5px;border-left:2px solid;padding:2px 4px;font-size:10px;line-height:1.3;overflow:hidden;cursor:pointer}
.wtl-evt:hover{filter:brightness(0.93);z-index:5}
.wtl-et{font-size:9px;opacity:0.65;display:block}
.wtl-en{font-weight:500;display:block;overflow:hidden}
.wtl-add{position:absolute;bottom:3px;right:3px;background:none;border:0.5px dashed #ddd;border-radius:4px;padding:1px 5px;font-size:9px;color:#ccc;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.wtl-add:hover{border-color:#5b7fa6;color:#5b7fa6}

/* ── WEEK LIST VIEW ── */
.wlist-wrap{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;align-items:start}
.wl-col{background:#fff;border-radius:10px;border:0.5px solid #e5e5ea;overflow:hidden}
.wl-col.today-col{border:1.5px solid #1c1c1e}
.wl-col.vac-col{background:#fdf8ee;border-color:#e8dfc8}
.wl-col.out-term{background:#f8f8f8;border-color:#eee}
.wl-hdr{padding:7px 6px 5px;border-bottom:0.5px solid #e5e5ea;text-align:center;background:#f9f9f9}
.wl-dow{font-size:10px;color:#8e8e93;font-weight:500}
.wl-dnum{font-size:16px;font-weight:600;color:#1c1c1e;line-height:1.2}
.wl-hdr.sun .wl-dow,.wl-hdr.sun .wl-dnum{color:#e03a2f}
.wl-hdr.sat .wl-dow,.wl-hdr.sat .wl-dnum{color:#378ADD}
.wl-col.today-col .wl-dnum{background:#1c1c1e;color:#fff;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;margin:0 auto}
.wl-body{padding:4px;display:flex;flex-direction:column;gap:3px}
.wl-evt{padding:4px 6px;border-radius:5px;border-left:2px solid;cursor:pointer;font-size:10px;line-height:1.35;word-break:break-all}
.wl-evt:hover{filter:brightness(0.93)}
.wl-et{font-size:9px;opacity:0.65;display:block;margin-bottom:1px}
.wl-en{font-weight:500;display:block}
.wl-add{width:100%;background:none;border:none;border-top:0.5px solid #f0f0f0;padding:5px 0 4px;font-size:10px;color:#ccc;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.wl-add:hover{color:#5b7fa6;background:#f5f8ff}
.wl-vac{padding:10px 6px;text-align:center;font-size:11px;color:#b08020}

/* ── DETAIL PANEL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px}
.overlay.open{display:flex}
.panel{background:#fff;border-radius:16px;border:0.5px solid #d1d1d6;width:460px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:20px 22px 24px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.panel-date{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600}
.panel-sub{font-size:11px;color:#8e8e93;margin-top:2px}
.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#8e8e93;padding:2px 6px;border-radius:6px}
.close-btn:hover{background:#f2f2f7}
.evt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.evt-card{border-radius:8px;border-left:3px solid;padding:8px 10px}
.ec-time{font-size:10px;color:#8e8e93;margin-bottom:2px}
.ec-name{font-size:13px;font-weight:500}
.ec-note{font-size:11px;color:#8e8e93;margin-top:1px}
.ec-actions{display:flex;gap:5px;margin-top:6px}
.ec-btn{background:none;border:0.5px solid #d1d1d6;border-radius:5px;font-size:10px;padding:2px 8px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;color:#3a3a3c}
.ec-btn:hover{background:#f2f2f7}
.ec-btn.del:hover{background:#fff0f0;border-color:#e04c2f;color:#e04c2f}
.ec-edit-form{margin-top:6px;display:flex;flex-direction:column;gap:5px;background:#f8f8fa;border-radius:7px;padding:9px}
.ec-edit-form input,.ec-edit-form select{padding:5px 8px;border:0.5px solid #d1d1d6;border-radius:6px;font-family:'Noto Sans SC',sans-serif;font-size:12px;background:#fff;color:#1c1c1e;outline:none;width:100%}
.ef-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ef-btns{display:flex;gap:5px}
.ef-save{background:#1c1c1e;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.ef-save:hover{background:#3a3a3c}
.ef-cancel{background:none;border:0.5px solid #d1d1d6;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;color:#3a3a3c}
.ef-cancel:hover{background:#f2f2f7}
.add-section{border-top:0.5px solid #e5e5ea;padding-top:12px;margin-top:4px}
.add-label{font-size:11px;font-weight:500;color:#8e8e93;margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase}
.add-form{display:flex;flex-direction:column;gap:7px}
.add-form input,.add-form select{padding:7px 10px;border:0.5px solid #d1d1d6;border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:12px;background:#fff;color:#1c1c1e;outline:none}
.add-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.save-btn{background:#1c1c1e;color:#fff;border:none;border-radius:8px;padding:8px;font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer;font-weight:500}
.save-btn:hover{background:#3a3a3c}

/* ── CATEGORY MANAGER MODAL ── */
.cat-modal{background:#fff;border-radius:16px;border:0.5px solid #d1d1d6;width:420px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:20px 22px 24px}
.cat-list{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:0.5px solid #e5e5ea;background:#fafafa}
.cat-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;cursor:pointer;border:0.5px solid rgba(0,0,0,0.1)}
.cat-label-text{flex:1;font-size:13px}
.cat-del{background:none;border:none;font-size:14px;color:#ccc;cursor:pointer;padding:0 2px}
.cat-del:hover{color:#e04c2f}
.cat-add-row{display:flex;gap:6px;margin-top:4px}
.cat-add-row input{flex:1;padding:7px 10px;border:0.5px solid #d1d1d6;border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:12px;outline:none}
.cat-add-btn{background:#1c1c1e;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.cat-add-btn:hover{background:#3a3a3c}
.cat-name-input{flex:1;border:none;background:transparent;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#1c1c1e;outline:none;padding:1px 3px;border-radius:4px;min-width:0}
.cat-name-input:focus{background:#fff;box-shadow:0 0 0 1.5px #5b7fa6}
.cat-name-input:hover{background:#f0f0f5}
input[type=color]{width:32px;height:28px;padding:2px;border:0.5px solid #d1d1d6;border-radius:6px;cursor:pointer;background:#fff}

/* ── MOBILE ── */
@media(max-width:600px){
  /* 整体间距 */
  .app{padding:10px 8px}

  /* 顶栏：标题左，按钮右，两行布局 */
  .topbar{flex-direction:column;align-items:stretch;gap:8px;margin-bottom:10px}
  .topbar>div:first-child{display:flex;align-items:center;justify-content:space-between}
  .topbar-title{font-size:16px}
  .topbar-sub{display:none}
  .topbar-right{justify-content:space-between;gap:4px;flex-wrap:nowrap}
  .btn{padding:6px 10px;font-size:12px;border-radius:8px}

<body>

<!-- ── AUTH SCREEN ── -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">日历系统</div>
    <div class="auth-sub">登录后管理你的个人日历与任务</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</div>
      <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</div>
    </div>
    <!-- Login form -->
    <div id="loginForm">
      <div class="auth-field">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>密码</label>

      </div>
      <button class="auth-btn" onclick="doLogin()">登录</button>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="auth-field">
        <label>用户名</label>
        <input type="text" id="regUser" placeholder="3-20个字符，仅字母数字下划线" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="regPass" placeholder="至少6位" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label>确认密码</label>

<!-- ── MAIN APP ── -->
<div class="app" id="mainApp" style="display:none">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="appTitle">日历</div>

      <button class="btn" onclick="changeNav(-1)">‹</button>
      <span class="nav-label" id="navLabel"></span>
      <button class="btn" onclick="changeNav(1)">›</button>
      <div class="sep"></div>
      <button class="btn active" id="btnMonth" onclick="setView('month')">月视图</button>
      <button class="btn" id="btnWeek" onclick="setView('week')">周视图</button>
      <div class="sep" id="weekSubSep" style="display:none"></div>
      <div class="layout-switch" id="layoutSwitch" style="display:none" onclick="toggleWeekLayout()">
        <div class="ls-track" id="lsTrack">
          <div class="ls-thumb" id="lsThumb"></div>
          <span class="ls-lbl ls-lbl-l" id="lsLabelL">时间轴</span>
          <span class="ls-lbl ls-lbl-r" id="lsLabelR">列表</span>
        </div>
      </div>
      <div class="sep"></div>
      <button class="btn" onclick="goToday()">今天</button>
      <div class="sep"></div>
      <!-- User chip -->
      <div class="user-chip" id="userChip" onclick="toggleUserMenu(event)">
        <div class="user-avatar" id="userAvatar"></div>
        <span class="user-name" id="userNameDisplay"></span>
        <div class="user-menu" id="userMenu">
          <div class="user-menu-label" id="userMenuLabel"></div>
          <div class="user-menu-item" onclick="openUserManager()">管理账户</div>
          <div class="user-menu-item" onclick="exportData()">导出备份</div>
          <div class="user-menu-item" onclick="document.getElementById('importFile').click()">导入备份</div>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

        </div>

  <div class="legend" id="legend"></div>
  <div id="filterBadge" style="display:none;margin-bottom:10px;padding:5px 12px;background:#fff;border-radius:8px;border:0.5px solid #e5e5ea;font-size:12px;color:#3a3a3c;align-items:center;gap:8px">

  <!-- Month -->
  <div id="monthView">
    <div class="cal-header">

      <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div>

</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="panel" id="panel">
    <div class="panel-head">
      <div><div class="panel-date" id="panelDate"></div><div class="panel-sub" id="panelSub"></div></div>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="evt-list" id="evtList"></div>
    <div class="add-section">
      <div class="add-label">添加日程</div>
      <div class="add-form">
        <input type="text" id="newName" placeholder="日程名称">
        <div class="add-row">
          <input type="text" id="newTime" placeholder="时间，如 9:00-11:30">
          <select id="newCat"></select>

<!-- Category manager overlay -->
<div class="overlay" id="catOverlay" onclick="bgClick2(event)">
  <div class="cat-modal">

      <button class="close-btn" onclick="closeCatManager()">✕</button>
    </div>
    <div style="font-size:11px;color:#8e8e93;margin-bottom:4px">点击色块修改颜色，点击名称可重命名，内置类型不可删除</div>

<!-- User manager overlay -->
<div class="overlay" id="umOverlay" onclick="bgClickUM(event)">
  <div class="um-modal">
    <div class="panel-head">
      <div class="panel-date">账户管理</div>
      <button class="close-btn" onclick="closeUserManager()">✕</button>
    </div>
    <div class="um-section">
      <div class="um-section-title">修改密码</div>
      <div class="um-pw-section">
        <div class="um-field"><input type="password" id="pwOld" placeholder="当前密码"></div>
        <div class="um-field"><input type="password" id="pwNew" placeholder="新密码（至少6位）"></div>
        <div class="um-field"><input type="password" id="pwNew2" placeholder="确认新密码"></div>
        <button class="um-save-btn" onclick="doChangePassword()">确认修改</button>
        <div class="um-msg" id="pwMsg"></div>
      </div>
    </div>
    <div class="um-section" id="umAllUsersSection">
      <div class="um-section-title">所有用户</div>
      <div class="um-user-list" id="umUserList"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// USER AUTH SYSTEM
// ═══════════════════════════════════════════════

const AUTH_KEY = 'szc_users';
const SESSION_KEY = 'szc_session';

function loadUsers() {
  return JSON.parse(localStorage.getItem(AUTH_KEY) || '[]');
}
function saveUsers(users) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(users));
}
function hashPass(pass) {
  // Simple deterministic hash for local-only storage (not cryptographic)
  let h = 0;
  for (let i = 0; i < pass.length; i++) {
    h = (Math.imul(31, h) + pass.charCodeAt(i)) | 0;
  }
  return 'h' + Math.abs(h).toString(36) + pass.length.toString(36);
}
function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
}
function setSession(user) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
}
function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

let currentUser = null; // {id, username}

function switchAuthTab(tab) {
  document.getElementById('tabLogin').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tabRegister').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('registerErr').textContent = '';
}

function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  const users = loadUsers();
  const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());
  if (!user || user.password !== hashPass(password)) {
    errEl.textContent = '用户名或密码错误';
    return;
  }
  loginAs({id: user.id, username: user.username});
}

function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;
  const errEl = document.getElementById('registerErr');
  errEl.textContent = '';
  if (!username) { errEl.textContent = '请输入用户名'; return; }
  if (!/^[a-zA-Z0-9_一-龥]{2,20}$/.test(username)) {
    errEl.textContent = '用户名需2-20个字符（字母、数字、下划线或中文）'; return;
  }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }
  if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }
  const users = loadUsers();
  if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
    errEl.textContent = '该用户名已被使用'; return;
  }
  const newUser = { id: 'u' + Date.now(), username, password: hashPass(password), createdAt: new Date().toISOString() };
  users.push(newUser);
  saveUsers(users);
  loginAs({id: newUser.id, username: newUser.username});
}

function loginAs(user) {
  currentUser = user;
  setSession(user);
  initUserData();
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';
  updateUserUI();
  renderLegend();
  goToday();
  setView('month');
}

function exportData() {
  closeUserMenu();
  const uid = currentUser.id;
  const prefix = 'szc_' + uid + '_';
  const data = { version: 1, username: currentUser.username, exportedAt: new Date().toISOString(), store: {} };
  Object.keys(localStorage).filter(k => k.startsWith(prefix)).forEach(k => {
    data.store[k.slice(prefix.length)] = localStorage.getItem(k);
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `calendar_backup_${currentUser.username}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e) {
  closeUserMenu();
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.store || data.version !== 1) { alert('文件格式不正确'); return; }
      if (!confirm(`导入「${data.username}」的备份数据（${data.exportedAt?.slice(0,10)}）？\n当前数据将被覆盖。`)) return;
      const uid = currentUser.id;
      const prefix = 'szc_' + uid + '_';
      // 清除旧数据
      Object.keys(localStorage).filter(k => k.startsWith(prefix)).forEach(k => localStorage.removeItem(k));
      // 写入备份
      Object.entries(data.store).forEach(([k, v]) => localStorage.setItem(prefix + k, v));
      initUserData();
      renderLegend();
      render();
      alert('导入成功！');
    } catch { alert('文件解析失败，请确认是正确的备份文件'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function doLogout() {
  currentUser = null;
  clearSession();
  store = {};
  userCats = [];
  catColorOverrides = {};
  catNameOverrides = {};
  activeFilter = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
  switchAuthTab('login');
  closeUserMenu();
}

function updateUserUI() {
  if (!currentUser) return;
  const initials = currentUser.username.slice(0, 2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userNameDisplay').textContent = currentUser.username;
  document.getElementById('userMenuLabel').textContent = '@' + currentUser.username;
  document.getElementById('appTitle').textContent = currentUser.username + ' 的日历';
}

function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userMenu').classList.toggle('open');
}
function closeUserMenu() {
  document.getElementById('userMenu').classList.remove('open');
}
document.addEventListener('click', closeUserMenu);

// ── USER MANAGER ──
function openUserManager() {
  closeUserMenu();
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwNew2').value = '';
  document.getElementById('pwMsg').textContent = '';
  document.getElementById('pwMsg').className = 'um-msg';
  renderUMUserList();
  document.getElementById('umOverlay').classList.add('open');
}
function closeUserManager() {
  document.getElementById('umOverlay').classList.remove('open');
}
function bgClickUM(e) { if (e.target === document.getElementById('umOverlay')) closeUserManager(); }

function renderUMUserList() {
  const list = document.getElementById('umUserList');
  list.innerHTML = '';
  const users = loadUsers();
  users.forEach(u => {
    const item = document.createElement('div');
    item.className = 'um-user-item';
    const isMe = u.id === currentUser.id;
    const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '未知';
    item.innerHTML = `
      <div class="um-avatar">${u.username.slice(0,2).toUpperCase()}</div>
      <div class="um-info">
        <div class="um-uname">${esc(u.username)}</div>
        <div class="um-umeta">注册于 ${date}</div>
      </div>
      <span class="um-badge${isMe ? ' you' : ''}">${isMe ? '当前用户' : '用户'}</span>
      ${!isMe ? `<button class="um-del" onclick="deleteUser('${u.id}')">删除</button>` : ''}
    `;
    list.appendChild(item);
  });
}

function deleteUser(uid) {
  const users = loadUsers();
  const u = users.find(x => x.id === uid);
  if (!u) return;
  if (!confirm(`确定删除用户「${u.username}」？该用户的所有数据将被清除，无法恢复。`)) return;
  // Remove user data
  const prefix = 'szc_' + uid + '_';
  Object.keys(localStorage).filter(k => k.startsWith(prefix)).forEach(k => localStorage.removeItem(k));
  saveUsers(users.filter(x => x.id !== uid));
  renderUMUserList();
}

function doChangePassword() {
  const msgEl = document.getElementById('pwMsg');
  msgEl.textContent = '';
  msgEl.className = 'um-msg';
  const oldP = document.getElementById('pwOld').value;
  const newP = document.getElementById('pwNew').value;
  const newP2 = document.getElementById('pwNew2').value;
  if (!oldP || !newP) { msgEl.className = 'um-msg err'; msgEl.textContent = '请填写所有字段'; return; }
  const users = loadUsers();
  const idx = users.findIndex(u => u.id === currentUser.id);
  if (idx < 0 || users[idx].password !== hashPass(oldP)) {
    msgEl.className = 'um-msg err'; msgEl.textContent = '当前密码错误'; return;
  }
  if (newP.length < 6) { msgEl.className = 'um-msg err'; msgEl.textContent = '新密码至少6位'; return; }
  if (newP !== newP2) { msgEl.className = 'um-msg err'; msgEl.textContent = '两次密码不一致'; return; }
  users[idx].password = hashPass(newP);
  saveUsers(users);
  msgEl.className = 'um-msg ok'; msgEl.textContent = '密码已修改';
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwNew2').value = '';
}

// ═══════════════════════════════════════════════
// PER-USER STORAGE HELPERS
// ═══════════════════════════════════════════════
function uKey(suffix) { return 'szc_' + currentUser.id + '_' + suffix; }

function initUserData() {
  store = JSON.parse(localStorage.getItem(uKey('store')) || '{}');
  userCats = JSON.parse(localStorage.getItem(uKey('cats')) || '[]');
  catColorOverrides = JSON.parse(localStorage.getItem(uKey('cat_colors')) || '{}');
  catNameOverrides = JSON.parse(localStorage.getItem(uKey('cat_names')) || '{}');
}

// ── TERM CONFIG ──────────────────────────────────────
const TERM_START = new Date(2026,5,1);
const TERM_END   = new Date(2026,7,23);
const VAC_WEEK   = 6;

// ── BUILT-IN CATEGORIES ──────────────────────────────
const BUILTIN_CATS = [
  {id:'cat-art',    name:'画画/艺术',     color:'#e04c2f'},
  {id:'cat-class',  name:'课程',          color:'#378ADD'},
  {id:'cat-study',  name:'学习/实习',     color:'#2d9a6a'},
  {id:'cat-meal',   name:'饮食',          color:'#c8860a'},
  {id:'cat-activity',name:'活动/体育',    color:'#7c52c8'},
  {id:'cat-person', name:'合作',          color:'#0e9a88'},
  {id:'cat-fixed',  name:'晚间固定',      color:'#8e8e93'},
];

let userCats = [];
let catColorOverrides = {};
let catNameOverrides = {};
function saveNameOverrides(){ localStorage.setItem(uKey('cat_names'), JSON.stringify(catNameOverrides)); }

function allCats(){
  return [
    ...BUILTIN_CATS.map(c=>({...c,
      name:  catNameOverrides[c.id]||c.name,
      color: catColorOverrides[c.id]||c.color,
      builtin:true
    })),
    ...userCats.map(c=>({...c, builtin:false}))
  ];
}

// ── STORAGE ──────────────────────────────────────────
let store = {};
function save(){ localStorage.setItem(uKey('store'), JSON.stringify(store)); }
function getStore(key){ if(!store[key])store[key]={overrides:{},deleted:[],custom:[]};return store[key]; }

// ── DATE UTILS ───────────────────────────────────────
function dk(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function dayOnly(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function inTerm(d){const t=dayOnly(d);return t>=dayOnly(TERM_START)&&t<=dayOnly(TERM_END);}
function weekNum(d){const s=dayOnly(TERM_START);const t=dayOnly(d);return Math.floor((t-s)/(7*86400000))+1;}
function isVac(d){return inTerm(d)&&weekNum(d)===VAC_WEEK;}
const DOW=['周日','周一','周二','周三','周四','周五','周六'];
const DOW_S=['日','一','二','三','四','五','六'];

const SCHEDULE_OWNER = '薛云泽'; // 只有该用户才加载固定课表

function getEvts(d){
  if(isVac(d)) return [{time:'',name:'放假休息',cat:'cat-fixed',id:'vac',_base:true,_id:'vac'}];
  const key=dk(d);const s=getStore(key);const dow=d.getDay();
  const result=[];
  // 固定课表仅对指定账户生效
  if(currentUser && currentUser.username === SCHEDULE_OWNER){
    const base=[...(WEEKLY[dow]||[]),...(dow!==0?NIGHT:[])];
    for(const ev of base){
      if(s.deleted.includes(ev.id)) continue;
      const ov=s.overrides[ev.id]||{};
      result.push({...ev,...ov,_base:true,_id:ev.id});
    }
  }
  for(const cv of s.custom) result.push({...cv,_base:false,_id:cv.id});
  return result;
}

// ── CAT STYLE HELPERS ────────────────────────────────
function hexToRgb(hex){
  let h=(hex||'#888888').replace('#','');
  if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  const r=parseInt(h.slice(0,2),16)||136;
  const g=parseInt(h.slice(2,4),16)||136;
  const b=parseInt(h.slice(4,6),16)||136;
  return {r,g,b};
}
function catStyle(catId){
  const c=catById(catId);
  const col=c.color||'#8e8e93';
  const {r,g,b}=hexToRgb(col);
  const bg=`rgba(${r},${g},${b},0.12)`;
  const text=`rgb(${Math.round(r*0.5)},${Math.round(g*0.5)},${Math.round(b*0.5)})`;
  return {bg, border:col, text};
}
function applyCardStyle(el,catId){
  const s=catStyle(catId);
  el.style.background=s.bg;
  el.style.borderColor=s.border;
  el.style.color=s.text;
}

// ── MONTH VIEW ───────────────────────────────────────
function renderMonth(){
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const today=dayOnly(new Date());
  const firstDow=new Date(viewYear,viewMonth,1).getDay();
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const total=Math.ceil((firstDow+dim)/7)*7;
  document.getElementById('navLabel').textContent=`${viewYear}年 ${viewMonth+1}月`;

  for(let i=0;i<total;i++){
    if(i%7===0){
      const repD=new Date(viewYear,viewMonth,i-firstDow+4);
      const wn=weekNum(repD);
      const wr=document.createElement('div');wr.className='week-num-row';
      if(wn>=1&&wn<=12){
        const vacNote=wn===VAC_WEEK?' 🏖 放假':'';
        wr.innerHTML=`<span class="week-num-tag" style="${wn===VAC_WEEK?'background:#fdf0cc;color:#a07010':''}" >Week ${wn}${vacNote}</span><div class="week-num-line"></div>`;
      }
      grid.appendChild(wr);
    }
    const dayN=i-firstDow+1;
    const d=new Date(viewYear,viewMonth,dayN);
    const outside=dayN<1||dayN>dim;
    const cell=document.createElement('div');
    const dow=d.getDay();
    let cls='day-cell';
    if(outside)cls+=' outside';
    else{
      if(dow===0)cls+=' sunday';if(dow===6)cls+=' saturday';
      if(dayOnly(d).getTime()===today.getTime())cls+=' today';
      if(isVac(d))cls+=' vacation';
    }
    cell.className=cls;
    const numDiv=document.createElement('div');numDiv.className='day-num';

      const isToday=dayOnly(d).getTime()===today.getTime();
      numDiv.innerHTML=isToday?`<span>${dayN}</span>`:dayN;
    }
    cell.appendChild(numDiv);
    if(!outside){
      const evts=getEvts(d);
      const filteredEvts=filterEvts(evts);
      const seen=new Set();
      const pips=evts.map(e=>{const col=catById(e.cat).color;const id=e.cat;if(seen.has(id))return null;seen.add(id);return {col,match:!activeFilter||e.cat===activeFilter};}).filter(Boolean);
      if(activeFilter&&!filteredEvts.length)cell.style.opacity='0.45';
      if(pips.length){
        const row=document.createElement('div');row.className='pip-row';
        pips.forEach(({col,match})=>{
          const p=document.createElement('div');p.className='pip';
          p.style.background=col;
          if(!match)p.style.opacity='0.2';
          row.appendChild(p);
        });
        cell.appendChild(row);
      }
      if(isVac(d)){const vb=document.createElement('div');vb.className='vac-badge';vb.textContent='放假';cell.appendChild(vb);}
      cell.onclick=()=>openPanel(d);
    }
    grid.appendChild(cell);

// ── WEEK VIEW ────────────────────────────────────────
const PX_PER_HR=60;
const TL_START=8;
const TL_END=24;
const TL_HRS=TL_END-TL_START;

function parseT(t){
  if(!t||t==='全天')return null;
  const m=t.match(/(\d+):(\d+)/);if(!m)return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  return h+min/60;
}
function parseRange(t){
  if(!t||t==='全天')return null;
  const dash=t.indexOf('-');if(dash<0)return null;
  const s=parseT(t.slice(0,dash));
  let e=parseT(t.slice(dash+1));
  if(s===null||e===null)return null;
  if(e<=s)e+=12;
  if(e>24)e=24;
  return{s,e};
}

function weekDays(){
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(viewWeekStart.getFullYear(),viewWeekStart.getMonth(),viewWeekStart.getDate()+i);
    days.push(d);
  }
  return days;
}

function weekNavLabel(days){
  const d0=days[0],d6=days[6];
  const wn=weekNum(d0);
  const wl=(wn>=1&&wn<=12)?` · Week ${wn}`:'';
  document.getElementById('navLabel').textContent=`${d0.getMonth()+1}/${d0.getDate()} – ${d6.getMonth()+1}/${d6.getDate()}${wl}`;
}

function renderWeek(){
  if(weekLayout==='list')renderWeekList();else renderWeekTimeline();
  updateSwitchUI();
}

function renderWeekTimeline(){
  document.getElementById('wlistWrap').style.display='none';
  document.getElementById('wtlWrap').style.display='flex';
  const today=dayOnly(new Date());
  const days=weekDays();
  weekNavLabel(days);
  const totalPx=TL_HRS*PX_PER_HR;

  const timesEl=document.getElementById('wtlTimes');timesEl.innerHTML='';
  const hdrPh=document.createElement('div');hdrPh.className='wtl-time-hdr';timesEl.appendChild(hdrPh);
  const adPh=document.createElement('div');adPh.className='wtl-time-allday';adPh.textContent='全天';timesEl.appendChild(adPh);
  for(let h=TL_START;h<=TL_END;h++){
    const sl=document.createElement('div');sl.className='wtl-time-slot';
    sl.textContent=h===24?'0:00':h+':00';timesEl.appendChild(sl);
  }

  const grid=document.getElementById('wtlGrid');grid.innerHTML='';

  days.forEach(d=>{
    const dow=d.getDay();const isToday=dayOnly(d).getTime()===today.getTime();
    const hdr=document.createElement('div');
    let cls='wtl-dhdr';if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';if(isToday)cls+=' tod';
    hdr.className=cls;
    const numHtml=isToday?`<div class="wtl-dnum"><span>${d.getDate()}</span></div>`:`<div class="wtl-dnum">${d.getDate()}</div>`;
    hdr.innerHTML=`<div class="wtl-dow">${DOW_S[dow]}</div>${numHtml}`;
    grid.appendChild(hdr);
  });

  days.forEach(d=>{
    const cell=document.createElement('div');cell.className='wtl-allday';
    const evts=isVac(d)?[{time:'',name:'放假休息 🏖',cat:'cat-fixed'}]:filterEvts(getEvts(d)).filter(e=>!e.time||e.time==='全天');
    evts.forEach(ev=>{
      const el=document.createElement('div');el.className='wtl-ae';
      applyCardStyle(el,ev.cat);el.textContent=ev.name;el.onclick=()=>openPanel(d);cell.appendChild(el);
    });
    grid.appendChild(cell);
  });

  days.forEach(d=>{
    const col=document.createElement('div');col.className='wtl-bodycol';col.style.height=totalPx+'px';
    for(let h=0;h<=TL_HRS;h++){
      const line=document.createElement('div');line.className='wtl-hr';line.style.top=(h*PX_PER_HR)+'px';col.appendChild(line);
    }
    if(!isVac(d)){
      filterEvts(getEvts(d)).filter(e=>e.time&&e.time!=='全天').forEach(ev=>{
        const range=parseRange(ev.time);if(!range)return;
        const topH=range.s-TL_START;const durH=Math.max(range.e-range.s,0.2);
        if(topH+durH<0||topH>=TL_HRS)return;
        const topPx=Math.max(topH*PX_PER_HR,0);
        const hPx=Math.min(Math.max(durH*PX_PER_HR,18),totalPx-topPx);
        const el=document.createElement('div');el.className='wtl-evt';
        applyCardStyle(el,ev.cat);
        el.style.top=topPx+'px';el.style.height=hPx+'px';
        el.innerHTML=`<span class="wtl-et">${ev.time}</span><span class="wtl-en">${ev.name}</span>`;
        el.onclick=()=>openPanel(d);col.appendChild(el);
      });
    }
    const addBtn=document.createElement('button');addBtn.className='wtl-add';addBtn.textContent='+ 添加';
    addBtn.onclick=()=>openPanel(d);col.appendChild(addBtn);
    grid.appendChild(col);
  });
}

function renderWeekList(){
  document.getElementById('wtlWrap').style.display='none';
  const wrap=document.getElementById('wlistWrap');wrap.style.display='grid';wrap.innerHTML='';
  const today=dayOnly(new Date());

    else filterEvts(getEvts(d)).forEach(ev=>{

    col.appendChild(body);
    const addBtn=document.createElement('button');addBtn.className='wl-add';addBtn.textContent='+ 添加';
    addBtn.onclick=()=>openPanel(d);col.appendChild(addBtn);
    wrap.appendChild(col);

function commitEdit(evId,key){
  const name=document.getElementById('ef_name').value.trim();if(!name)return;
  const upd={name,time:document.getElementById('ef_time').value.trim(),cat:document.getElementById('ef_cat').value,note:document.getElementById('ef_note').value.trim()};
  const s=getStore(key);
  const parts=key.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const dow=d.getDay();
  const baseIds=new Set([...(WEEKLY[dow]||[]),...NIGHT].map(e=>e.id));
  if(baseIds.has(evId)){
    s.overrides[evId]=Object.assign({},s.overrides[evId]||{},upd);
  } else {
    const ci=s.custom.findIndex(e=>e.id===evId);
    if(ci>=0) Object.assign(s.custom[ci],upd);
  }
  save();render();renderEvtList(d);
}
function doDelete(ev,d){
  const key=dk(d);const s=getStore(key);const dow=d.getDay();
  const baseIds=new Set([...(WEEKLY[dow]||[]),...NIGHT].map(e=>e.id));
  if(baseIds.has(ev._id||ev.id)){if(!s.deleted.includes(ev._id||ev.id))s.deleted.push(ev._id||ev.id);}
  else{s.custom=s.custom.filter(e=>e.id!==(ev._id||ev.id));}
  save();render();renderEvtList(d);
}
function saveNewEvt(){
  const name=document.getElementById('newName').value.trim();if(!name)return document.getElementById('newName').focus();
  const s=getStore(openKey);
  s.custom.push({id:'c'+Date.now(),name,time:document.getElementById('newTime').value.trim(),cat:document.getElementById('newCat').value,note:document.getElementById('newNote').value.trim()});
  const _p=openKey.split('-');
  save();render();renderEvtList(new Date(parseInt(_p[0]),parseInt(_p[1])-1,parseInt(_p[2])));
  document.getElementById('newName').value='';document.getElementById('newTime').value='';document.getElementById('newNote').value='';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ── CATEGORY MANAGER ─────────────────────────────────
function openCatManager(){
  renderCatList();populateCatSelects();
  document.getElementById('catOverlay').classList.add('open');
}
function closeCatManager(){document.getElementById('catOverlay').classList.remove('open');}
function bgClick2(e){if(e.target===document.getElementById('catOverlay'))closeCatManager();}

function renderCatList(){
  const list=document.getElementById('catList');list.innerHTML='';
  allCats().forEach(c=>{
    const item=document.createElement('div');item.className='cat-item';
    const sw=document.createElement('input');sw.type='color';sw.value=c.color;sw.className='cat-swatch';
    sw.title='点击修改颜色';
    sw.oninput=e=>{
      if(c.builtin){catColorOverrides[c.id]=e.target.value;}
      else{const uc=userCats.find(u=>u.id===c.id);if(uc)uc.color=e.target.value;}
      saveCats();renderLegend();render();
    };
    const nameInput=document.createElement('input');
    nameInput.type='text';nameInput.className='cat-name-input';
    nameInput.value=c.name;nameInput.title='点击重命名';
    nameInput.onchange=e=>{
      const newName=e.target.value.trim();
      if(!newName){e.target.value=c.name;return;}
      if(c.builtin){
        catNameOverrides[c.id]=newName;
        saveNameOverrides();
      } else {
        const uc=userCats.find(u=>u.id===c.id);
        if(uc){uc.name=newName;saveCats();}
      }
      renderLegend();populateCatSelects();render();
    };
    nameInput.onkeydown=e=>{if(e.key==='Enter')nameInput.blur();if(e.key==='Escape'){nameInput.value=c.name;nameInput.blur();}};
    item.appendChild(sw);item.appendChild(nameInput);
    if(!c.builtin){
      const del=document.createElement('button');del.className='cat-del';del.textContent='✕';del.title='删除';
      del.onclick=()=>{
        if(!confirm(`删除类型"${c.name}"？`))return;
        userCats=userCats.filter(u=>u.id!==c.id);
        saveCats();renderCatList();renderLegend();populateCatSelects();render();
      };
      item.appendChild(del);
    } else {
      const isModified=catColorOverrides[c.id]||catNameOverrides[c.id];
      if(isModified){
        const rst=document.createElement('button');rst.className='cat-del';rst.title='恢复默认';
        rst.style.color='#5b7fa6';rst.textContent='↺';
        rst.onclick=()=>{
          delete catColorOverrides[c.id];
          delete catNameOverrides[c.id];
          saveCats();saveNameOverrides();
          renderCatList();renderLegend();populateCatSelects();render();
        };
        item.appendChild(rst);
      }
    }
    list.appendChild(item);
  });
}
function addCat(){
  const name=document.getElementById('newCatName').value.trim();if(!name)return;
  const color=document.getElementById('newCatColor').value;
  const id='cat_'+Date.now();
  userCats.push({id,name,color});saveCats();
  document.getElementById('newCatName').value='';
  renderCatList();renderLegend();populateCatSelects();
}
